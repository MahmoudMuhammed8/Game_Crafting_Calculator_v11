<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Forge — Crafting Catalog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen grain text-stone-300">
  <header class="border-b border-amber-900/50 bg-stone-950/80 backdrop-blur sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <h1 class="forge-title text-2xl text-amber-400 tracking-widest">⚒ THE FORGE</h1>
      <nav id="cat-nav" class="flex gap-1">
        <button data-cat="all" class="forge-title text-xs tracking-widest px-4 py-2 transition-colors duration-150 text-stone-400 hover:text-amber-300">ALL</button>
        <button data-cat="combat" class="forge-title text-xs tracking-widest px-4 py-2 transition-colors duration-150 text-stone-400 hover:text-amber-300">COMBAT</button>
        <button data-cat="tech" class="forge-title text-xs tracking-widest px-4 py-2 transition-colors duration-150 text-stone-400 hover:text-amber-300">TECH</button>
        <button data-cat="materials" class="forge-title text-xs tracking-widest px-4 py-2 transition-colors duration-150 text-stone-400 hover:text-amber-300">MATERIALS</button>
      </nav>
    </div>
  </header>
  <div class="max-w-5xl mx-auto px-6 pt-8 flex flex-col sm:flex-row gap-3">
    <input id="search" type="text" placeholder="Search items or ingredients…"
      class="flex-1 bg-stone-900 border border-stone-700 text-stone-200 placeholder-stone-600 forge-title text-xs tracking-widest rounded-sm px-4 py-2 focus:outline-none focus:border-amber-600">
    <select id="sort" class="bg-stone-900 border border-stone-700 text-stone-400 forge-title text-xs tracking-widest rounded-sm px-3 py-2 focus:outline-none focus:border-amber-600">
      <option value="default">Sort: Default</option>
      <option value="name-asc">Name A → Z</option>
      <option value="name-desc">Name Z → A</option>
      <option value="components-asc">Fewest Components</option>
      <option value="components-desc">Most Components</option>
    </select>
  </div>
  <main class="max-w-5xl mx-auto px-6 py-6">
    <p id="status" class="forge-title text-xs tracking-[.25em] text-amber-700 mb-2 uppercase"></p>
    <div id="card-grid">
      <!-- Generated dynamically -->
    </div>
  </main>
  <footer class="text-center py-8 text-stone-700 text-xs forge-title tracking-widest">
    THE FORGE &copy; <span id="year"></span>
  </footer>
  <script src="app.js"></script>
</body>
</html>
